steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -f
      - Dockerfile.web
      - --build-arg
      - NEXT_PUBLIC_TWILIO_JOIN_CODE=${_JOIN_CODE}
      - -t
      - asia-southeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/kai-web
      - .
images:
  - asia-southeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/kai-web
substitutions:
  _JOIN_CODE: 'join replace-me'
options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
